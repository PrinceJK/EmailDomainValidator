name: EmailDomainValidator CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  # Runs on every push and every PR targeting master
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test --configuration Release --no-build --verbosity normal

  # Runs only on direct pushes to master (i.e. after a PR is merged)
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Generate Version Number
        id: get-version
        run: |
          VERSION_PREFIX=$(grep -oPm1 '(?<=<VersionPrefix>)[^<]+' EmailDomainValidator/EmailDomainValidator.csproj)
          FULL_VERSION="$VERSION_PREFIX.${{ github.run_number }}"
          echo "VERSION=$FULL_VERSION" >> $GITHUB_ENV
          echo "Generated version: $FULL_VERSION"

      - name: Pack NuGet Package
        run: dotnet pack --configuration Release --no-build --output nupkg /p:Version=${{ env.VERSION }}

      - name: Publish to NuGet
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: nupkg/*.nupkg
          draft: false
          prerelease: false

